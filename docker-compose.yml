services:
  n8n:
    image: n8nio/n8n:latest
    container_name: agriverse_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agriverse_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agriverse_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - n8n
    environment:
      - NODE_ENV=development
      - WEBHOOK=http://n8n:5678/webhook-test/my-endpoint

volumes:
  n8n_data:
